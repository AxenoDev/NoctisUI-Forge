import groovy.json.JsonSlurper

plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id "com.modrinth.minotaur" version "2.+" // Réintégration de Modrinth
}

// --- LOGIQUE DE VERSIONNEMENT DYNAMIQUE (GIT) ---
def getLatestGitTag() {
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'describe', '--tags', '--abbrev=0'
            standardOutput = stdout
        }
        return stdout.toString().trim()
    } catch(Exception e) {
        return "unknown"
    }
}

def tag = System.getenv("TAG") ?: getLatestGitTag()
def isSnapshot = System.getenv('SNAPSHOT')?.toBoolean() ?: false
def gitHash = System.getenv("GIT_HASH") ?: "local"

// Utilise la logique dynamique ou fallback sur mod_version du gradle.properties
version = System.getenv("TAG") || System.getenv("SNAPSHOT") ?
        (isSnapshot ? "$tag-SNAPSHOT-${gitHash.take(7)}" : tag) : project.mod_version

group = project.mod_group_id

base {
    archivesName = project.mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

minecraft {
    mappings channel: mapping_channel, version: mapping_version
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'

            jvmArgs += [
                    "--add-opens", "java.base/jdk.internal.misc=ALL-UNNAMED",
                    "--add-opens", "java.base/java.lang=ALL-UNNAMED"
            ]

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            property 'forge.enabledGameTestNamespaces', mod_id
            property 'fml.mods.exclude', 'OptiFine_1.20.1_HD_U_I6_MOD.jar'
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            workingDirectory project.file('run-data')
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    maven { url 'https://maven.minecraftforge.net/' }
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    // Lombok (Mis à jour pour le dev et les tests)
    compileOnly("org.projectlombok:lombok:1.18.38")
    annotationProcessor("org.projectlombok:lombok:1.18.38")
    testCompileOnly("org.projectlombok:lombok:1.18.38")
    testAnnotationProcessor("org.projectlombok:lombok:1.18.38")
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            forge_version: forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: version, // Utilise la version dynamique
            mod_authors: mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'Specification-Title'     : mod_id,
                'Specification-Vendor'    : mod_authors,
                'Specification-Version'   : '1',
                'Implementation-Title'    : project.name,
                'Implementation-Version'  : project.jar.archiveVersion,
                'Implementation-Vendor'   : mod_authors,
                'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                'GIT-COMMIT'              : gitHash
        ])
    }
    from("LICENSE") {
        rename { "${it}_${project.archivesBaseName}" }
    }
    finalizedBy 'reobfJar' // Important pour Forge : Obfuscation du Jar
}

// --- LOGIQUE REQUÊTES GITHUB & MODRINTH ---
def fetchReleaseDescription = { String releaseTag ->
    try {
        if (!releaseTag || releaseTag == 'unknown' || releaseTag.startsWith('dev-')) {
            logger.lifecycle("modrinth: release tag is '${releaseTag}', falling back to README.md")
            return file("README.md").text
        }

        def repo = 'AxenoDev/NoctisUI'
        def apiUrl = "https://api.github.com/repos/${repo}/releases/tags/${releaseTag}"
        def connection = new URL(apiUrl).openConnection()
        def ghToken = System.getenv('GITHUB_TOKEN')
        if (ghToken) {
            connection.setRequestProperty('Authorization', "token ${ghToken}")
        }
        connection.setRequestProperty('Accept', 'application/vnd.github.v3+json')
        connection.connect()

        if (connection.responseCode == 200) {
            def text = connection.inputStream.text
            def json = new JsonSlurper().parseText(text)
            if (json.body) {
                logger.lifecycle("modrinth: using GitHub release description for tag ${releaseTag}")
                return json.body.toString()
            }
        }
    } catch (Exception e) {
        logger.lifecycle("modrinth: failed to fetch release description (${e.message}), falling back to README.md")
    }
    return file("README.md").text
}

def writeModrinthBodyFile = { String text ->
    def outFile = file("${buildDir}/modrinth-description.md")
    outFile.parentFile.mkdirs()
    outFile.text = text
    return outFile
}

def determineModrinthVersionType = { String releaseTag ->
    if (!releaseTag) return 'alpha'
    def tagLower = releaseTag.toLowerCase()
    if (tagLower.contains('snapshot') || tagLower.contains('dev') || tagLower.contains('alpha') || tagLower.matches(/v?\d+\.\d+(-?a|alpha).*/)) {
        return 'alpha'
    }
    if (tagLower.contains('beta') || tagLower.matches(/v?\d+\.\d+(-?b|beta).*/)) {
        return 'beta'
    }
    if (tagLower.contains('rc') || tagLower.matches(/v?\d+\.\d+(-?rc).*/)) {
        return 'beta'
    }
    return 'release'
}

// --- CONFIGURATIONS POST-ÉVALUATIONS (FORGE COMPATIBLE) ---
afterEvaluate {
    modrinth {
        token = System.getenv("MODRINTH_TOKEN")
        projectId = "noctisui"
        versionNumber = version
        versionName = "NoctisUI ${version}"

        // Utilise de manière sécurisée la tâche reobfJar générée tardivement par Forge
        uploadFile = tasks.named('reobfJar').flatMap { it.archiveFile }

        gameVersions = ["${minecraft_version}"]
        loaders = ["forge"]

        def modrinthBody = fetchReleaseDescription(tag)
        writeModrinthBodyFile(modrinthBody)

        syncBodyFrom = modrinthBody
        versionType = determineModrinthVersionType(tag)
    }

    // --- CONFIGURATION MAVEN (GITHUB PACKAGES) ---
    publishing {
        publications {
            register('mavenJava', MavenPublication) {
                artifactId = 'noctisui'

                // Utilise aussi le jar ré-obfusqué pour Maven
                artifact tasks.named('reobfJar').flatMap { it.archiveFile }

                pom {
                    name = 'NoctisUI'
                    description = 'NoctisUI is a Minecraft UI library that makes it easy to create menus and HUDs.'
                    url = 'https://github.com/AxenoDev/NoctisUI'
                    licenses {
                        license {
                            name = 'GNU General Public License v3.0'
                            url = 'https://opensource.org/licenses/GPL-3.0'
                        }
                    }
                    developers {
                        developer {
                            id = 'AxenoDev'
                            name = 'AxenoDev'
                            url = 'https://axeno.me'
                        }
                    }
                    scm {
                        connection = 'scm:git:git://github.com/AxenoDev/NoctisUI.git'
                        developerConnection = 'scm:git:ssh://github.com:AxenoDev/NoctisUI.git'
                        url = 'https://github.com/AxenoDev/NoctisUI'
                    }
                }
            }
        }
        repositories {
            maven {
                name = "GitHubPackages"
                url = uri("https://maven.pkg.github.com/AxenoDev/NoctisUI")
                credentials {
                    username = System.getenv("GITHUB_ACTOR")
                    password = System.getenv("GITHUB_TOKEN")
                }
            }
        }
    }

    // Sécurité additionnelle : s'assure du bon ordre des tâches lors d'une publication pure
    tasks.named('publish').configure {
        dependsOn 'reobfJar'
    }
}

tasks.register('printModrinthBody') {
    group = 'help'
    doLast {
        def body = fetchReleaseDescription(tag)
        def outFile = writeModrinthBodyFile(body)
        println "Modrinth description written to: ${outFile.absolutePath}"
        println body
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}