name: Build

on:
  pull_request:
    paths-ignore:
      - '.github/**'
      - .gitignore
      - 'LICENSE'
      - '**.md'
  push:
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - 'LICENSE'
      - '**.md'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with snapshot version
        env:
          SNAPSHOT: true
          GITHUB_SHA: ${{ github.sha }}
        run: ./gradlew build devJar

      - name: Stage jars for upload
        run: |
          mkdir -p builds
          PROD_JAR=$(ls build/libs/*.jar | grep -v '\-dev\.jar$' | head -n 1)
          DEV_JAR=$(ls build/libs/*-dev.jar | head -n 1)
          cp "$PROD_JAR" builds/
          cp "$DEV_JAR" builds/
          echo "Production: $(basename "$PROD_JAR")"
          echo "Development: $(basename "$DEV_JAR") (use this jar in run/mods for local Forge dev)"

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: "noctisui-${{ github.sha }}"
          path: builds/