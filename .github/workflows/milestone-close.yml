name: Handle closing a milestone

on:
  milestone:
    types: [closed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  handle-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Build and release NoctisUI
      # -----------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: |
          VERSION=$(echo ${{ github.event.milestone.title }} | tr "." "_")
          ./gradlew build devJar
          mkdir -p builds
          PROD_JAR=$(ls build/libs/*.jar | grep -v '\-dev\.jar$' | head -n 1)
          DEV_JAR=$(ls build/libs/*-dev.jar | head -n 1)
          cp "$PROD_JAR" "builds/noctisui-$VERSION.jar"
          cp "$DEV_JAR" "builds/noctisui-$VERSION-dev.jar"
        env:
          TAG: ${{ github.event.milestone.title }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noctisui-${{ github.event.milestone.title }}.jar
          path: builds/

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: |
          chmod +x ./gradlew
          echo "Publishing to Modrinth for tag: $TAG"
          ./gradlew --no-daemon modrinth
        env:
          TAG: ${{ github.event.milestone.title }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.milestone.title }}
          name: Release ${{ github.event.milestone.title }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
          body: |
            # Update of NoctisUI ${{ github.event.milestone.title }}
            
            ## Description
            ${{ github.event.milestone.description }}

            ## JAR files

            | File | Usage |
            |------|--------|
            | `noctisui-*-dev.jar` | **Local Forge development** — put this in `run/mods` or `libs/` when developing another mod (e.g. Site Omega). |
            | `noctisui-*.jar` (no suffix) | **Production** — player instances, Modrinth, release classpath. Do **not** use this jar in `run/mods` during userdev. |
          files: |
            builds/**
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}